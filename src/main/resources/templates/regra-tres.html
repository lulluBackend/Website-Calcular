<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcular - Regra de Três</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/calculadoras.css">
</head>
<body class="regra-tres-page">
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="/" class="logo-link">🧮 Calcular</a>
            </div>
            <div class="user-area">
                <span class="user-greeting" th:text="'Olá, ' + ${userName} + '!'"></span>
                <a href="/" class="btn-header">Voltar</a>
            </div>
        </div>
    </header>

    <main class="calculadora-container">
        <div class="calculadora-card">
            <h1>🔄 Regra de Três Simples</h1>
            <p class="subtitulo">a / b = c / x</p>
            
            <form action="/calcular-regra-tres" method="post" class="calculadora-form">
                <div class="form-group">
                    <label for="valor1">Valor de a:</label>
                    <input type="number" step="any" id="valor1" name="valor1" placeholder="Ex: 2" required>
                </div>
                
                <div class="form-group">
                    <label for="valor2">Valor de b:</label>
                    <input type="number" step="any" id="valor2" name="valor2" placeholder="Ex: 4" required>
                </div>
                
                <div class="form-group">
                    <label for="valor3">Valor de c:</label>
                    <input type="number" step="any" id="valor3" name="valor3" placeholder="Ex: 6" required>
                </div>

                <button type="submit" class="btn-calcular">Calcular</button>
            </form>

            <div th:if="${resultado}" class="resultado-card">
                <h3>Resultado:</h3>
                <p class="resultado-texto" th:text="${resultado}"></p>
                <p class="resultado-destaque" th:text="'x = ' + ${x}"></p>
            </div>

            <div class="info-box">
                <h4>📌 Fórmula:</h4>
                <p>x = (b × c) / a</p>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <p>© 2026 Calcular - Todos os direitos reservados</p>
            <div class="social-links">
                <a href="https://linkedin.com/in/lucas-campos-23059030a" target="_blank" class="social-link">
                    <img src="/images/linkedin-icon.svg" alt="LinkedIn" class="social-icon">
                    LinkedIn
                </a>
                <a href="https://github.com/lulluBackend" target="_blank" class="social-link">
                    <img src="/images/github-icon.svg" alt="GitHub" class="social-icon">
                    GitHub
                </a>
            </div>
        </div>
    </footer>


</body>
</html>
