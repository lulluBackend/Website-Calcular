<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Calcular</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/register.css">
</head>
<body class="register-page">
   
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="/" class="logo-link">🧮 Calcular</a>
            </div>
            <div class="user-area">
          
            </div>
        </div>
    </header>

    <div class="container register-container">
        <div class="card">
            <h1>Criar Conta</h1>
            
            <div th:if="${param.error != null and param.error[0] == 'email_exists'}" class="error">
                ⚠️ Email já cadastrado! Tente outro ou <a href="/login">faça login</a>.
            </div>
            
            <form action="/register" method="post">
                <div class="form-group">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required/>
                </div>
                
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required/>
                </div>
                
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required/>
                    <div class="password-hint">Mínimo de 6 caracteres</div>
                </div>
                
                <button type="submit" class="btn">Registrar</button>
            </form>
            
            <div class="link">
                Já tem uma conta? <a href="/login">Faça login aqui</a>
            </div>
            
            <div class="link">
                <a href="/">← Voltar para a página inicial</a>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <div class="footer-container">
            <p>© 2026 Calcular - Todos os direitos reservados</p>
            <div class="social-links">
                <a href="https://linkedin.com/in/lucas-campos-23059030a" target="_blank" class="social-link">
                    <img src="/images/linkedin-icon.svg" alt="LinkedIn" class="social-icon">
                    LinkedIn
                </a>
                <a href="https://github.com/lulluBackend" target="_blank" class="social-link">
                    <img src="/images/github-icon.svg" alt="GitHub" class="social-icon">
                    GitHub
                </a>
            </div>
        </div>
    </footer>

</body>
</html>
